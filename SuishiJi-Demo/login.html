<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 岁时记</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--ink); min-height: 100vh; display: flex; overflow: hidden; }

    .login-left {
      flex: 1.2;
      background: url('images/hero.jpg') center/cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(26,26,46,0.85), rgba(26,26,46,0.6));
    }
    .login-left-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: white;
      max-width: 400px;
      padding: 40px;
    }
    .login-logo-mark {
      width: 64px;
      height: 64px;
      background: rgba(196,163,90,0.2);
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--gold);
    }
    .login-left h1 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
    }
    .login-left p {
      font-size: 0.9rem;
      color: rgba(250,246,238,0.6);
      line-height: 1.8;
    }
    .login-quote {
      margin-top: 32px;
      padding: 20px;
      border-left: 2px solid var(--gold);
      text-align: left;
      background: rgba(0,0,0,0.2);
      border-radius: 0 8px 8px 0;
    }
    .login-quote-text {
      font-family: var(--font-display);
      font-size: 0.95rem;
      color: rgba(250,246,238,0.85);
      line-height: 1.8;
      margin-bottom: 6px;
    }
    .login-quote-from {
      font-size: 0.78rem;
      color: var(--gold);
    }

    .login-right {
      flex: 0.8;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      overflow-y: auto;
    }

    .login-panel {
      width: 100%;
      max-width: 380px;
    }

    .login-panel-header {
      margin-bottom: 32px;
    }

    .login-panel-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .login-panel-subtitle {
      font-size: 0.88rem;
      color: var(--ink-medium);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--cream-deep);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--ink);
      background: white;
      transition: var(--transition);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(196,163,90,0.12);
    }

    .form-input::placeholder { color: #C8C0B8; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--ink-medium);
      cursor: pointer;
    }

    .form-check input { accent-color: var(--vermilion); cursor: pointer; }

    .form-link {
      font-size: 0.82rem;
      color: var(--vermilion);
      font-weight: 500;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .btn-login:hover {
      background: var(--vermilion);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(200,64,49,0.25);
    }

    .form-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 20px 0;
      font-size: 0.78rem;
      color: var(--ink-medium);
    }

    .form-divider::before,
    .form-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cream-deep);
    }

    .social-login {
      display: flex;
      gap: 10px;
    }

    .social-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--cream-deep);
      border-radius: var(--radius-sm);
      background: white;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-medium);
      font-family: var(--font-body);
    }

    .social-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .switch-text {
      text-align: center;
      font-size: 0.85rem;
      color: var(--ink-medium);
      margin-top: 24px;
    }

    .switch-text a { color: var(--vermilion); font-weight: 600; }

    .tabs {
      display: flex;
      background: var(--snow);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      background: transparent;
      color: var(--ink-medium);
      border: none;
      font-family: var(--font-body);
    }

    .tab.active {
      background: white;
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .login-form { display: block; }
    .register-form { display: none; }
    .login-form.active, .register-form.active { display: block; animation: fadeInUp 0.4s ease; }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .login-left { flex: none; height: 35vh; }
      .login-left-content { padding: 30px; }
      .login-left h1 { font-size: 1.6rem; }
      .login-quote { display: none; }
      .login-right { flex: 1; padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <!-- Left -->
  <div class="login-left">
    <div class="login-left-content">
      <div class="login-logo-mark">歳</div>
      <h1>岁时记</h1>
      <p>循天地之序，悟四时之美。二十四节气是中国古人仰望星空、俯察大地的智慧。</p>
      <div class="login-quote">
        <div class="login-quote-text">"春生夏长，秋收冬藏，<br>天地之正，四时之纪。"</div>
        <div class="login-quote-from">——《黄帝内经》</div>
      </div>
    </div>
  </div>

  <!-- Right -->
  <div class="login-right">
    <div class="login-panel">

      <div class="login-panel-header">
        <div class="login-panel-title" id="panelTitle">登录</div>
        <div class="login-panel-subtitle">欢迎来到岁时记，继续您的文化之旅</div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="login" onclick="switchTab('login')">登录</button>
        <button class="tab" data-tab="register" onclick="switchTab('register')">注册</button>
      </div>

      <!-- Login -->
      <form class="login-form active" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="form-label">邮箱 / 用户名</label>
          <input type="text" class="form-input" placeholder="请输入邮箱或用户名" required>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <div class="form-options">
          <label class="form-check">
            <input type="checkbox"> 记住我
          </label>
          <a href="#" class="form-link" onclick="alert('密码重置功能即将上线')">忘记密码？</a>
        </div>
        <button type="submit" class="btn-login">登 录</button>
        <div class="form-divider">或</div>
        <div class="social-login">
          <button type="button" class="social-btn" onclick="alert('微信登录即将支持')">💬 微信</button>
          <button type="button" class="social-btn" onclick="alert('微博登录即将支持')">📧 微博</button>
        </div>
        <div class="switch-text">
          还没有账号？<a href="javascript:void(0)" onclick="switchTab('register')">立即注册</a>
        </div>
      </form>

      <!-- Register -->
      <form class="register-form" onsubmit="return handleRegister(event)">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" placeholder="给自己起个雅号" required>
        </div>
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-input" placeholder="输入常用邮箱" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">性别</label>
            <select class="form-input">
              <option value="">选择</option>
              <option>男</option>
              <option>女</option>
              <option>保密</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">生日</label>
            <input type="date" class="form-input">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" placeholder="至少8位，包含数字和字母" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label">确认密码</label>
          <input type="password" class="form-input" placeholder="再输一次密码" required>
        </div>
        <div class="form-options">
          <label class="form-check">
            <input type="checkbox" required> 我已阅读并同意
          </label>
          <a href="#" class="form-link" onclick="alert('用户协议开发中')">服务条款</a>
        </div>
        <button type="submit" class="btn-login">注册账号</button>
        <div class="switch-text">
          已有账号？<a href="javascript:void(0)" onclick="switchTab('login')">立即登录</a>
        </div>
      </form>

    </div>
  </div>

  <!-- Footer -->
  <div style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:10px;background:transparent;z-index:10;">
    <span style="font-size:0.72rem;color:rgba(250,246,238,0.3);letter-spacing:0.05em;">© 2026 岁时记 SuishiJi · 源码来自小红书-代号大学生，仅供学习交流参考</span>
  </div>

  <script>
    /* Tab 切换：登录 / 注册 */
    function switchTab(tabName) {
      var tabs = document.querySelectorAll('.tab');
      tabs.forEach(function(t) { t.classList.remove('active'); });
      if (tabName === 'login') {
        document.querySelector('[data-tab="login"]').classList.add('active');
        document.getElementById('panelTitle').textContent = '登录';
        document.querySelector('.login-form').style.display = 'block';
        document.querySelector('.register-form').style.display = 'none';
      } else {
        document.querySelector('[data-tab="register"]').classList.add('active');
        document.getElementById('panelTitle').textContent = '注册';
        document.querySelector('.login-form').style.display = 'none';
        document.querySelector('.register-form').style.display = 'block';
      }
    }

    /* 登录提交 */
    function handleLogin(e) {
      e.preventDefault();
      var form = e.target;
      var btn = form.querySelector('.btn-login');
      btn.textContent = '登录中...';
      btn.disabled = true;
      setTimeout(function() {
        showToast('登录成功！欢迎回来！');
        btn.textContent = '登 录';
        btn.disabled = false;
        setTimeout(function() { window.location.href = 'index.html'; }, 800);
      }, 1000);
    }

    /* 注册提交 */
    function handleRegister(e) {
      e.preventDefault();
      var form = e.target;
      var btn = form.querySelector('.btn-login');
      var pwd1 = form.querySelectorAll('input[type="password"]')[0].value;
      var pwd2 = form.querySelectorAll('input[type="password"]')[1].value;
      if (pwd1 !== pwd2) {
        showToast('两次密码输入不一致，请检查！');
        return;
      }
      if (pwd1.length < 8) {
        showToast('密码至少需要8位字符！');
        return;
      }
      btn.textContent = '注册中...';
      btn.disabled = true;
      setTimeout(function() {
        showToast('注册成功！即将跳转登录...');
        btn.textContent = '注册账号';
        btn.disabled = false;
        form.reset();
        setTimeout(function() { switchTab('login'); }, 1200);
      }, 1200);
    }

    /* Toast 提示 */
    function showToast(msg) {
      var old = document.querySelector('.suishi-toast');
      if (old) old.remove();
      var el = document.createElement('div');
      el.className = 'suishi-toast';
      el.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);padding:12px 28px;border-radius:4px;font-family:var(--font-body);font-weight:500;font-size:0.88rem;z-index:99999;letter-spacing:0.05em;box-shadow:0 8px 30px rgba(26,26,46,0.2);opacity:0;transition:all 0.3s ease;white-space:nowrap;';
      el.textContent = msg;
      document.body.appendChild(el);
      requestAnimationFrame(function() { el.style.opacity = '1'; });
      setTimeout(function() {
        el.style.opacity = '0';
        setTimeout(function() { if (el.parentNode) el.remove(); }, 300);
      }, 2500);
    }
  </script>
