<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>茶百味 - 新鲜现做 · 好茶不将就</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/user.css">
  <link rel="stylesheet" href="css/admin.css">

  <style>
    /* Loading screen inline for instant display */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      font-size: 56px;
      margin-bottom: 16px;
      animation: bounce 1s ease infinite;
    }
    .loading-text {
      font-size: 22px;
      font-weight: 700;
      color: #FF6B35;
      letter-spacing: 4px;
    }
    .loading-subtext {
      font-size: 13px;
      color: #999;
      margin-top: 8px;
    }
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 24px;
    }
    .loading-dot {
      width: 6px;
      height: 6px;
      background: #FF6B35;
      border-radius: 50%;
      animation: loadDot 1.2s ease infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loadDot {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-logo">🍵</div>
    <div class="loading-text">茶百味</div>
    <div class="loading-subtext">新鲜现做 · 好茶不将就</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <!-- App Container -->
  <div id="phone-frame">
    <div id="app"></div>
  </div>

  <!-- JavaScript -->
  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/user.js"></script>
  <script src="js/admin.js"></script>

  <script>
    // ---- Initialize App ----
    document.addEventListener('DOMContentLoaded', function() {
      // Register routes
      router
        .register('home', function(route, prev, direction) {
          stopAdminRefresh();
          renderHomePage();
          scrollToTop();
        })
        .register('menu', function(route, prev, direction) {
          stopAdminRefresh();
          renderMenuPage();
          scrollToTop();
        })
        .register('cart', function(route, prev, direction) {
          stopAdminRefresh();
          renderCartPage();
          scrollToTop();
        })
        .register('order-success', function(route, prev, direction) {
          stopAdminRefresh();
          renderOrderSuccessPage();
          scrollToTop();
        })
        .register('orders', function(route, prev, direction) {
          stopAdminRefresh();
          renderOrderListPage();
          scrollToTop();
        })
        .register('admin/login', function(route, prev, direction) {
          stopAdminRefresh();
          renderAdminLoginPage();
          scrollToTop();
        })
        .register('admin/dashboard', function(route, prev, direction) {
          renderAdminDashboard();
          scrollToTop();
        })
        .register('admin/orders', function(route, prev, direction) {
          renderAdminOrdersPage();
          scrollToTop();
        })
        .register('admin/menu', function(route, prev, direction) {
          stopAdminRefresh();
          renderAdminMenuPage();
          scrollToTop();
        })
        .register('admin/stats', function(route, prev, direction) {
          stopAdminRefresh();
          renderAdminStatsPage();
          scrollToTop();
        });

      // Set default route if none
      if (!window.location.hash) {
        window.location.hash = 'home';
      }

      // Hide loading screen
      setTimeout(function() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('fade-out');
          setTimeout(function() {
            loadingScreen.remove();
          }, 500);
        }
      }, 800);
    });

    function scrollToTop() {
      const app = document.getElementById('app');
      if (app) app.scrollTop = 0;
      window.scrollTo(0, 0);
    }

    // ---- Listen for order updates (cross-tab sync) ----
    window.addEventListener('storage', function(e) {
      if (e.key === 'chabaiwei_orders') {
        // Refresh current page if on admin
        const route = router.getCurrentRoute();
        if (route.startsWith('admin/')) {
          if (route === 'admin/dashboard') renderAdminDashboard();
          else if (route === 'admin/orders') renderAdminOrdersPage();
        }
      }
    });

    // ---- Custom event for same-tab sync ----
    window.addEventListener('ordersUpdated', function() {
      const route = router.getCurrentRoute();
      if (route.startsWith('admin/')) {
        if (route === 'admin/dashboard') updateAdminStats();
      }
    });
  </script>
</body>
</html>
